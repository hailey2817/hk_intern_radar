name: Refresh internship research

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: internship-research-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Scan official employer sources
        run: python3 scripts/research_refresh.py
      - name: Commit refreshed research feed
        run: |
          git config user.name "internship-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/research_results.json data/research_status.json
          if git diff --cached --quiet; then
            echo "No research changes to commit"
          else
            git commit -m "Refresh internship research feed"
            git push
          fi
