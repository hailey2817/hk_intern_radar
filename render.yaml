services:
  - type: web
    name: hk-internship-radar
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: RUNTIME_DATA_DIR
        value: /var/data
      - key: RESEARCH_SYNC_TOKEN
        generateValue: true
    disk:
      name: internship-research-data
      mountPath: /var/data
      sizeGB: 1
