services:
  - type: web
    name: hk-internship-radar
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: RUNTIME_DATA_DIR
        value: /tmp/hk-internship-data
      - key: RESEARCH_SYNC_TOKEN
        generateValue: true
